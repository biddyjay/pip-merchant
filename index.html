function getScoreInfo(score) {
  if (score >= 80) return { label: "PHONE CALL", emoji: "📞", color: "#10B981", bg: "#022c22", border: "#10B981" }
  if (score >= 60) return { label: "TRADE ALERT", emoji: "✅", color: "#3B82F6", bg: "#0c1a2e", border: "#3B82F6" }
  if (score >= 40) return { label: "MONITOR", emoji: "👁", color: "#F59E0B", bg: "#1c0d00", border: "#F59E0B" }
  return { label: "NO ALERT", emoji: "❌", color: "#6B7280", bg: "#0a0a0a", border: "#334155" }
}

function calcScore(selMain, selMods) {
  let total = 0
  GROUPS_DATA.forEach(g => {
    const selId = selMain[g.id]
    if (selId) { const item = g.items.find(i => i.id === selId); if (item) total += item.points }
    g.mods.forEach(m => { if (selMods[m.id]) total += m.points })
  })
  return total
}

function getCheckedConfs(selMain, selMods) {
  const list = []
  GROUPS_DATA.forEach(g => {
    const selId = selMain[g.id]
    if (selId) { const item = g.items.find(i => i.id === selId); if (item) list.push(`${item.label} (${item.points > 0 ? '+' : ''}${item.points})`) }
    g.mods.forEach(m => { if (selMods[m.id]) list.push(`${m.label} (${m.points > 0 ? '+' : ''}${m.points})`) })
  })
  return list
}

function getEntryModel(selMain) {
  const selId = selMain[4]
  if (!selId) return "—"
  const item = GROUPS_DATA[3].items.find(i => i.id === selId)
  return item ? item.label : "—"
}

function exportCSV(trades) {
  const headers = ["Date (UTC)", "Pair", "Direction", "Entry Model", "Score", "Confluences", "Risk %", "R:R", "Outcome", "Notes"]
  const rows = trades.map(t => [
    new Date(t.time).toISOString().replace("T", " ").slice(0, 16),
    t.pair,
    t.direction,
    t.entryModel || "—",
    t.score,
    `"${(t.confs || []).join(" | ")}"`,
    t.risk || "—",
    t.rr,
    t.outcome,
    `"${(t.notes || "").replace(/"/g, "'")}"`
  ])
  const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n")
  const blob = new Blob([csv], { type: "text/csv" })
  const url = URL.createObjectURL(blob)
  const a = document.createElement("a")
  a.href = url
  a.download = `pip_merchant_journal_${new Date().toISOString().slice(0,10)}.csv`
  a.click()
  URL.revokeObjectURL(url)
}

          const sel = selMain[g.id] === item.id

function JournalView({ trades, onClose, onDelete }) {
  const wins = trades.filter(t => t.outcome === "Win").length
  const losses = trades.filter(t => t.outcome === "Loss").length
  const bes = trades.filter(t => t.outcome === "BE").length
  const decided = trades.filter(t => t.outcome !== "BE").length
  const winRate = decided ? Math.round(wins / decided * 100) : 0

  // Entry model stats
  const modelCounts = {}
  trades.forEach(t => {
    const m = t.entryModel || "—"
    if (!modelCounts[m]) modelCounts[m] = { total: 0, wins: 0, losses: 0, bes: 0 }
    modelCounts[m].total++
    if (t.outcome === "Win") modelCounts[m].wins++
    else if (t.outcome === "Loss") modelCounts[m].losses++
    else modelCounts[m].bes++
  })
  const modelRows = Object.entries(modelCounts).sort((a, b) => b[1].total - a[1].total)

  return (
    <div style={{ position: "fixed", inset: 0, background: "#020817", zIndex: 200, overflowY: "auto" }}>
      <div style={{ maxWidth: 520, margin: "0 auto", padding: 12 }}>

        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, padding: "10px 0", borderBottom: "1px solid #1E293B" }}>
          <div>
            <div style={{ fontSize: 8, color: "#334155", textTransform: "uppercase", letterSpacing: "0.12em" }}>Pip Merchant</div>
            <div style={{ fontSize: 16, fontWeight: 900, color: "#f1f5f9" }}>Trade Journal</div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => exportCSV(trades)}
              style={{ background: "#1E293B", border: "1px solid #334155", color: "#94a3b8", padding: "6px 10px", borderRadius: 6, cursor: "pointer", fontFamily: "inherit", fontSize: 10 }}>
              ↓ Export CSV
            </button>
            <button onClick={onClose}
              style={{ background: "transparent", border: "1px solid #334155", color: "#475569", padding: "6px 10px", borderRadius: 6, cursor: "pointer", fontFamily: "inherit", fontSize: 10 }}>
              ← Back
            </button>
          </div>
        </div>

        {/* Stats row */}
        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          {[
            { label: "Trades", value: trades.length, color: "#64748B" },
            { label: "Win Rate", value: `${winRate}%`, color: "#10B981" },
            { label: "Wins", value: wins, color: "#10B981" },
            { label: "BE", value: bes, color: "#F59E0B" },
            { label: "Losses", value: losses, color: "#EF4444" },
          ].map(s => (
            <div key={s.label} style={{ flex: 1, background: "#0F172A", border: "1px solid #1E293B", borderRadius: 8, padding: "8px 4px", textAlign: "center" }}>
              <div style={{ fontSize: 16, fontWeight: 900, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 8, color: "#475569", marginTop: 1 }}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Entry model breakdown */}
        {modelRows.length > 0 && (
          <div style={{ background: "#0F172A", border: "1px solid #1E293B", borderRadius: 10, padding: "10px 12px", marginBottom: 12 }}>
            <div style={{ fontSize: 9, color: "#94a3b8", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8, fontWeight: 700 }}>Entry Model Breakdown</div>
            {modelRows.map(([model, s]) => (
              <div key={model} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "5px 0", borderBottom: "1px solid #1E293B" }}>
                <div style={{ fontSize: 9.5, color: "#94a3b8", flex: 1, paddingRight: 8 }}>{model}</div>
                <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                  <span style={{ fontSize: 9, color: "#64748b" }}>{s.total}x</span>
                  <span style={{ fontSize: 9, color: "#10B981" }}>{s.wins}W</span>
                  <span style={{ fontSize: 9, color: "#F59E0B" }}>{s.bes}BE</span>
                  <span style={{ fontSize: 9, color: "#EF4444" }}>{s.losses}L</span>
                  <span style={{ fontSize: 9, color: "#3B82F6", minWidth: 28, textAlign: "right" }}>
                    {s.total - s.bes > 0 ? Math.round(s.wins / (s.total - s.bes) * 100) : 0}%
                  </span>
                </div>
              </div>
            ))}
          </div>
        )}

        {trades.length === 0 && (
          <div style={{ textAlign: "center", color: "#334155", padding: "40px 0", fontSize: 12 }}>No trades logged yet</div>
        )}

        {/* Trade list */}
        {[...trades].reverse().map((t, i) => {
          const outcomeColor = t.outcome === "Win" ? "#10B981" : t.outcome === "BE" ? "#F59E0B" : "#EF4444"
          const pairColor = t.pair === "EUR/USD" ? "#3B82F6" : "#D4A017"
          const si = getScoreInfo(t.score)
          return (
            <div key={i} style={{ background: "#0F172A", border: "1px solid #1E293B", borderRadius: 10, padding: 12, marginBottom: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div>
                  <span style={{ fontSize: 11, fontWeight: 700, color: pairColor }}>{t.pair}</span>
                  <span style={{ fontSize: 10, color: t.direction === "Buy" ? "#10B981" : "#EF4444", marginLeft: 8, fontWeight: 700 }}>{t.direction === "Buy" ? "▲" : "▼"} {t.direction}</span>
                  <span style={{ fontSize: 9, color: "#475569", marginLeft: 8 }}>{t.rr}</span>
                  <span style={{ fontSize: 9, color: t.risk === "1%" ? "#EF4444" : "#F59E0B", marginLeft: 8, fontWeight: 700 }}>{t.risk || "—"}</span>
                  <div style={{ fontSize: 8.5, color: "#94a3b8", marginTop: 2 }}>
                    {t.entryModel || "—"} · {t.confCount || 0} confluences · {t.risk || "—"} risk
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <span style={{ fontSize: 18, fontWeight: 900, color: si.color }}>{t.score}</span>
                  <span style={{ fontSize: 10, fontWeight: 700, color: outcomeColor, background: `${outcomeColor}22`, padding: "2px 8px", borderRadius: 4 }}>{t.outcome}</span>
                </div>
              </div>
              <div style={{ fontSize: 8, color: "#475569", marginBottom: 6 }}>{new Date(t.time).toLocaleString("en-GB", { timeZone: "UTC" })} UTC</div>
              {t.confs && t.confs.length > 0 && (
                <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginBottom: 5 }}>
                  {t.confs.map((c, ci) => (
                    <span key={ci} style={{ fontSize: 8, background: "#1a2540", color: "#94a3b8", padding: "2px 5px", borderRadius: 3 }}>{c}</span>
                  ))}
                </div>
              )}
              {t.notes && <div style={{ fontSize: 9, color: "#475569", fontStyle: "italic", marginBottom: 4 }}>{t.notes}</div>}
              <button onClick={() => { if(confirm('Delete this trade?')) onDelete(trades.length - 1 - i) }}
                style={{ background: "transparent", border: "1px solid #EF444466", color: "#EF4444", cursor: "pointer", fontSize: 9, fontFamily: "inherit", padding: "3px 10px", borderRadius: 4, marginTop: 6 }}>✕ Delete</button>
            </div>
          )
        })}
      </div>
    </div>
  )
}

function App() {
  const [activePair, setActivePair] = useState("eu")
  const [activeGroup, setActiveGroup] = useState(1)
  const [showLog, setShowLog] = useState(null)
  const [showJournal, setShowJournal] = useState(false)

  const [state, setState] = useState({
    eu: { selMain: {}, selMods: {} },
    gu: { selMain: {}, selMods: {} }
  })

  const [trades, setTrades] = useState(() => {
    try { return JSON.parse(localStorage.getItem("pm_trades") || "[]") } catch { return [] }
  })

  useEffect(() => {
    try { localStorage.setItem("pm_trades", JSON.stringify(trades)) } catch {}
  }, [trades])

  const onToggleMain = (pair, groupId, itemId) => {
    setState(prev => ({ ...prev, [pair]: { ...prev[pair], selMain: { ...prev[pair].selMain, [groupId]: prev[pair].selMain[groupId] === itemId ? null : itemId } } }))
  }

  const onToggleMod = (pair, modId) => {
    setState(prev => ({ ...prev, [pair]: { ...prev[pair], selMods: { ...prev[pair].selMods, [modId]: !prev[pair].selMods[modId] } } }))
  }

  const resetPair = (pair) => setState(prev => ({ ...prev, [pair]: { selMain: {}, selMods: {} } }))

  const cs = state[activePair]
  const score = calcScore(cs.selMain, cs.selMods)
  const si = getScoreInfo(score)
  const color = PAIR_CONFIG[activePair].color
  const activeG = GROUPS_DATA.find(g => g.id === activeGroup)

  return (
    <div style={{ minHeight: "100vh", background: "#020817", color: "#f1f5f9", display: "flex", flexDirection: "column" }}>
      {showJournal && <JournalView trades={trades} onClose={() => setShowJournal(false)} onDelete={i => setTrades(prev => prev.filter((_, idx) => idx !== i))} />}
      {showLog && (
        <LogModal
          pair={PAIR_CONFIG[showLog].pair}
          pairColor={PAIR_CONFIG[showLog].color}
          score={calcScore(state[showLog].selMain, state[showLog].selMods)}
          confs={getCheckedConfs(state[showLog].selMain, state[showLog].selMods)}
          entryModel={getEntryModel(state[showLog].selMain)}
          onClose={() => setShowLog(null)}
          onSave={trade => { setTrades(prev => [...prev, trade]); setShowLog(null); resetPair(showLog) }}
        />
      )}

      <div style={{ maxWidth: 520, margin: "0 auto", width: "100%", display: "flex", flexDirection: "column", minHeight: "100vh" }}>

        {/* Header */}
        <div style={{ padding: "12px 12px 0", background: "#030d1c", borderBottom: "1px solid #0F172A" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 9, color: "#D4A017", letterSpacing: "0.2em", textTransform: "uppercase", fontWeight: 700 }}>● PIP MERCHANT</div>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#f8fafc", letterSpacing: "-0.02em" }}>Confluence Scorer</div>
            </div>
            <button onClick={() => setShowJournal(true)}
              style={{ background: "#0F172A", border: "1px solid #334155", color: "#94a3b8", padding: "7px 11px", borderRadius: 7, cursor: "pointer", fontFamily: "inherit", fontSize: 10, fontWeight: 600 }}>
              📋 Journal ({trades.length})
            </button>
          </div>

          {/* Pair tabs */}
          <div style={{ display: "flex" }}>
            {Object.entries(PAIR_CONFIG).map(([key, val]) => {
              const ps = calcScore(state[key].selMain, state[key].selMods)
              return (
                <button key={key} onClick={() => setActivePair(key)}
                  style={{ flex: 1, padding: "9px 0", background: "transparent", border: "none", borderBottom: activePair === key ? `2px solid ${val.color}` : "2px solid transparent", color: activePair === key ? val.color : "#475569", cursor: "pointer", fontSize: 12, fontWeight: 700, fontFamily: "inherit", letterSpacing: "0.04em" }}>
                  {val.pair}
                  {ps !== 0 && <span style={{ marginLeft: 6, fontSize: 9, color: val.color, background: `${val.color}22`, padding: "1px 5px", borderRadius: 3 }}>{ps}</span>}
                </button>
              )
            })}
          </div>
        </div>

        {/* Group tabs */}
        <div style={{ display: "flex", borderBottom: "1px solid #1E293B", background: "#050e1c" }}>
          {GROUPS_DATA.map(g => {
            const gSelId = cs.selMain[g.id]
            const gPts = (gSelId ? (g.items.find(i => i.id === gSelId)?.points || 0) : 0) + g.mods.reduce((a, m) => cs.selMods[m.id] ? a + m.points : a, 0)
            const active = activeGroup === g.id
            return (
              <button key={g.id} onClick={() => setActiveGroup(g.id)}
                style={{ flex: 1, padding: "7px 2px", background: active ? "#0c1524" : "transparent", border: "none", borderBottom: active ? `2px solid ${color}` : "2px solid transparent", color: active ? color : "#475569", cursor: "pointer", fontFamily: "inherit", textAlign: "center" }}>
                <div style={{ fontSize: 10, fontWeight: 700 }}>{g.label}</div>
                {gPts !== 0 && <div style={{ fontSize: 9, fontWeight: 900, color: gPts > 0 ? "#34d399" : "#f87171", marginTop: 1 }}>{gPts > 0 ? "+" : ""}{gPts}</div>}
              </button>
            )
          })}
        </div>

        {/* Group content */}
        <div style={{ flex: 1, overflowY: "auto", padding: "8px 10px" }}>
          {activeG && <GroupPanel g={activeG} color={color} selMain={cs.selMain} selMods={cs.selMods} onToggleMain={(gId, iId) => onToggleMain(activePair, gId, iId)} onToggleMod={(mId) => onToggleMod(activePair, mId)} />}
        </div>

        {/* Score footer */}
        <div style={{ background: si.bg, borderTop: `2px solid ${si.border}`, padding: "10px 12px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div>
              <div style={{ fontSize: 9, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.12em", fontWeight: 600 }}>Total Score</div>
              <div style={{ fontSize: 44, fontWeight: 900, color: si.color, lineHeight: 1 }}>{score}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: si.color, background: `${si.color}22`, padding: "6px 14px", borderRadius: 7, marginBottom: 5 }}>
                {si.emoji} {si.label}
              </div>
              <div style={{ fontSize: 8.5, color: "#64748b", lineHeight: 1.8, fontWeight: 500 }}>
                <span style={{ color: "#6B7280" }}>&lt;40 No alert</span>  ·  <span style={{ color: "#F59E0B" }}>40–59 Monitor</span>  ·  <span style={{ color: "#3B82F6" }}>60–79 Trade</span>  ·  <span style={{ color: "#10B981" }}>80+ Call</span>
              </div>
            </div>
          </div>

          <div style={{ display: "flex", gap: 7 }}>
            <button onClick={() => setShowLog(activePair)}
              style={{ flex: 2, padding: "10px 0", background: color, border: "none", color: "#fff", borderRadius: 7, cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 700, letterSpacing: "0.02em" }}>
              + Log Trade
            </button>
            <button onClick={() => resetPair(activePair)}
              style={{ flex: 1, padding: "10px 0", background: "transparent", border: "1px solid #1E293B", color: "#475569", borderRadius: 7, cursor: "pointer", fontFamily: "inherit", fontSize: 10 }}>
              Reset
            </button>
          </div>
        </div>

      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
